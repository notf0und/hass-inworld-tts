name: Sync Repository Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  labeler:
    name: Sync labels
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Sync repository labels
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          skip-delete: false
